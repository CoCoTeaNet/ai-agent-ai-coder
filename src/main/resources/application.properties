# 服务器配置
server.port=8080
server.servlet.context-path=/

# 应用名称
spring.application.name=agent-web-app

# Thymeleaf 配置
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# 静态资源配置
spring.web.resources.static-locations=classpath:/static/

# 日志配置
logging.level.root=INFO
logging.level.com.example.agent=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Agent 配置
agent.default.provider=OLLAMA
agent.default.model-name=qwen3.5:latest
agent.default.base-url=http://localhost:11434
agent.default.temperature=0.7
agent.default.max-tokens=2048
agent.default.enable-tools=true
agent.default.max-iterations=5

# 会话管理配置
agent.session.max-history=20
agent.session.timeout-minutes=60
